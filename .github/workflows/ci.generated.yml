        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 5
          submodules: false
      - name: Clone rusty_v8 fork (v8 patch dependency)
        if: github.event_name == 'pull_request'
        run: 'git clone --depth 1 --branch locker-v149.4.0 https://github.com/ibrahimthecosmic/rusty_v8.git ../rusty_v8'
      - name: Clone submodule ./tests/util/std
        if: github.event_name == 'pull_request'
        run: git submodule update --init --recursive --depth=1 -- ./tests/util/std
      - name: Clone submodule ./tests/wpt/suite
        if: github.event_name == 'pull_request'
        run: git submodule update --init --recursive --depth=1 -- ./tests/wpt/suite
      - name: Restore cache wpt and autobahn test run hashes
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
        if: github.event_name == 'pull_request'
        with:
          path: |-
            ./target/wpt_input_hash
            ./target/autobahn_input_hash
          key: never_saved
          restore-keys: 119-wpt-target-linux-x86_64-release-
      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        if: github.event_name == 'pull_request'
        with:
          deno-version: v2.x
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        if: github.event_name == 'pull_request'
        with:
          python-version: 3.11
      - name: Download artifact release-linux-x86_64-flow
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53
        if: github.event_name == 'pull_request'
        with:
          name: release-linux-x86_64-flow
