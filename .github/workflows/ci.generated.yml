          clang-22 -c -o /tmp/glibc_math_shim.o tools/glibc_math_shim.c -fPIC

          echo "Decompressing sysroot..."
          wget -q https://github.com/denoland/deno_sysroot_build/releases/download/sysroot-20250207/sysroot-`uname -m`.tar.xz -O /tmp/sysroot.tar.xz
          cd /
          xzcat /tmp/sysroot.tar.xz | sudo tar -x
          sudo mount --rbind /dev /sysroot/dev
          sudo mount --rbind /sys /sysroot/sys
          sudo mount --rbind /home /sysroot/home
          sudo mount -t proc /proc /sysroot/proc
          cd

          echo "Done."

          # Configure the build environment. Both Rust and Clang will produce
          # llvm bitcode only, so we can use lld's incremental LTO support.

          # Load the sysroot's env vars
          echo "sysroot env:"
          cat /sysroot/.env
          . /sysroot/.env

          # Important notes:
          #   1. -ldl seems to be required to avoid a failure in FFI tests. This flag seems
          #      to be in the Rust default flags in the smoketest, so uncertain why we need
          #      to be explicit here.
          #   2. RUSTFLAGS and RUSTDOCFLAGS must be specified, otherwise the doctests fail
          #      to build because the object formats are not compatible.
          echo "
          CARGO_PROFILE_BENCH_INCREMENTAL=false
          CARGO_PROFILE_RELEASE_INCREMENTAL=false
          RUSTFLAGS<<__1
            -C linker-plugin-lto=true
            -C linker=clang-22
            -C link-arg=-fuse-ld=lld-22
            -C link-arg=-Wl,--icf=safe
            -C link-arg=-ldl
            -C link-arg=-Wl,--allow-shlib-undefined
            -C link-arg=-Wl,--thinlto-cache-dir=$(pwd)/target/release/lto-cache
            -C link-arg=-Wl,--thinlto-cache-policy,cache_size_bytes=700m
            -C link-arg=/tmp/memfd_create_shim.o
            -C link-arg=/tmp/glibc_math_shim.o
            -C link-arg=-Wl,--wrap=expf
            -C link-arg=-Wl,--wrap=powf
            -C link-arg=-Wl,--wrap=exp2f
            -C link-arg=-Wl,--wrap=log2f
            -C link-arg=-Wl,--wrap=logf
            --cfg tokio_unstable
            $RUSTFLAGS
          __1
          RUSTDOCFLAGS<<__1
            -C linker-plugin-lto=true
            -C linker=clang-22
            -C link-arg=-fuse-ld=lld-22
            -C link-arg=-Wl,--icf=safe
            -C link-arg=-ldl
            -C link-arg=-Wl,--allow-shlib-undefined
            -C link-arg=-Wl,--thinlto-cache-dir=$(pwd)/target/release/lto-cache
            -C link-arg=-Wl,--thinlto-cache-policy,cache_size_bytes=700m
            -C link-arg=/tmp/memfd_create_shim.o
            -C link-arg=/tmp/glibc_math_shim.o
            -C link-arg=-Wl,--wrap=expf
            -C link-arg=-Wl,--wrap=powf
            -C link-arg=-Wl,--wrap=exp2f
            -C link-arg=-Wl,--wrap=log2f
            -C link-arg=-Wl,--wrap=logf
            --cfg tokio_unstable
            $RUSTFLAGS
          __1
          CC=/usr/bin/clang-22
          CFLAGS=$CFLAGS
          " > $GITHUB_ENV
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@0b24824336e2b3800b0f89d9e08b2c08bfa3dcdd
        if: github.event_name == 'pull_request'
      - name: Install nextest
        if: github.event_name == 'pull_request'
        run: cargo binstall cargo-nextest --secure --locked
      - name: Cargo nextest (release)
        if: github.event_name == 'pull_request'
        run: |-
          cargo nextest run --release \
                --features "deno_core/default deno_core/unsafe_use_unprotected_platform" \
                --tests --examples \
                -p deno_core -p build-your-own-js-snapshot -p dcore -p deno_ops -p deno_ops_compile_test_runner -p serde_v8 -p deno_core_testing
      - name: Cargo nextest ops compile test runner (release)
        if: github.event_name == 'pull_request'
        run: cargo nextest run --release -p deno_ops_compile_test_runner
      - name: Cargo doc test
        if: github.event_name == 'pull_request'
        run: cargo test --doc --release -p deno_core -p build-your-own-js-snapshot -p deno_ops -p serde_v8 -p deno_core_testing
      - name: Run examples (regression tests)
        if: github.event_name == 'pull_request'
        run: cargo run -p deno_core --example op2
      - name: Cache cargo home
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        if: 'github.event_name == ''pull_request'' && (github.ref == ''refs/heads/main'' || startsWith(github.ref, ''refs/tags/''))'
        with:
          path: |-
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: '119-cargo-home-linux-x86_64-deno-core-test-${{ github.sha }}'
      - name: Cache build output
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
        if: 'github.event_name == ''pull_request'' && (github.ref == ''refs/heads/main'' || startsWith(github.ref, ''refs/tags/''))'
        with:
          path: |-
            ./target
            !./target/*/gn_out
            !./target/*/gn_root
            !./target/*/*.zip
            !./target/*/*.tar.gz
          key: '119-cargo-target-linux-x86_64-release-deno-core-test-${{ github.sha }}'
  deno-core-miri:
    name: deno_core miri linux-x86_64
    needs:
      - pre_build
    if: needs.pre_build.outputs.skip_build != 'true' && needs.pre_build.outputs.docs_only != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
      RUST_LIB_BACKTRACE: 0
    steps:
      - name: Configure git
        if: github.event_name == 'pull_request'
        run: |-
          git config --global core.symlinks true
          git config --global fetch.parallel 32
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 5
          submodules: false
      - name: Clone rusty_v8 fork (v8 patch dependency)
        if: github.event_name == 'pull_request'
        run: 'git clone --depth 1 --branch locker-v149.4.0 https://github.com/ibrahimthecosmic/rusty_v8.git ../rusty_v8'
      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        if: github.event_name == 'pull_request'
        with:
          toolchain: nightly-2025-11-12
      - name: Cargo test (miri)
        if: github.event_name == 'pull_request'
        run: |-
          cargo clean
          rustup component add --toolchain nightly-2025-11-12 miri
          # This somehow prints errors in CI that don't show up locally
          RUSTFLAGS=-Awarnings cargo +nightly-2025-11-12 miri test -p deno_core
  ci-status:
    name: ci status
    needs:
      - build-release-linux-x86_64
      - test-release-linux-x86_64
      - wpt-release-linux-x86_64
      - lint
      - deno-core-test
      - deno-core-miri
      - pre_build
    if: needs.pre_build.outputs.skip_build != 'true' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Ensure CI success
        run: |-
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo 'CI failed'
            exit 1
          fi

